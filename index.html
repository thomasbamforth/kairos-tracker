<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kairos Program Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            carolina: '#4B9CD3',
            navy: '#13294B',
          }
        }
      }
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #EDF4FB; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #4B9CD3; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ============================================================
    // FIREBASE CONFIGURATION
    // ============================================================
    
    const firebaseConfig = {
      apiKey: "AIzaSyBct-saxv2_u2SpEaObAzo0rsWB34mA6Ck",
      authDomain: "kairos-tracker-e7486.firebaseapp.com",
      databaseURL: "https://kairos-tracker-e7486-default-rtdb.firebaseio.com",
      projectId: "kairos-tracker-e7486",
      storageBucket: "kairos-tracker-e7486.firebasestorage.app",
      messagingSenderId: "256280721389",
      appId: "1:256280721389:web:ff97c99bec5685489e99e4",
      measurementId: "G-2WSFFKP603"
    };

    // Initialize Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // ============================================================
    // PORTAL SELECTION SCREEN
    // ============================================================

    function PortalSelection({ onSelectPortal }) {
      return (
        <div className="min-h-screen flex items-center justify-center" style={{ background: '#EDF4FB' }}>
          <div className="max-w-4xl w-full px-4">
            {/* Header */}
            <div className="text-center mb-12">
              <div className="flex items-center justify-center gap-3 mb-4">
                <div style={{ background: '#4B9CD3' }} className="w-16 h-16 rounded-2xl flex items-center justify-center font-black text-white text-3xl">K</div>
                <div>
                  <h1 className="text-4xl font-bold" style={{ color: '#13294B' }}>Kairos</h1>
                  <p className="text-gray-500">Program Tracker</p>
                </div>
              </div>
              <p className="text-gray-600">Select your portal to continue</p>
            </div>

            {/* Portal Cards */}
            <div className="grid md:grid-cols-2 gap-6">
              {/* Team Portal */}
              <button
                onClick={() => onSelectPortal('team')}
                className="bg-white rounded-2xl p-8 shadow-lg hover:shadow-xl transition-all border-2 border-transparent hover:border-carolina text-left group"
              >
                <div className="flex items-center gap-4 mb-4">
                  <div className="w-16 h-16 rounded-xl bg-blue-100 flex items-center justify-center text-3xl">
                    👥
                  </div>
                  <div>
                    <h2 className="text-2xl font-bold text-gray-900">Team Portal</h2>
                    <p className="text-sm text-gray-500">For program participants</p>
                  </div>
                </div>
                <p className="text-gray-600 mb-4">
                  Access your team's workspace, track progress, submit assignments, and view program resources.
                </p>
                <div className="text-carolina font-semibold group-hover:translate-x-2 transition-transform inline-block">
                  Enter Team Portal →
                </div>
              </button>

              {/* Program Manager Portal */}
              <button
                onClick={() => onSelectPortal('pm')}
                className="bg-white rounded-2xl p-8 shadow-lg hover:shadow-xl transition-all border-2 border-transparent hover:border-navy text-left group"
              >
                <div className="flex items-center gap-4 mb-4">
                  <div className="w-16 h-16 rounded-xl bg-indigo-100 flex items-center justify-center text-3xl">
                    ⚙️
                  </div>
                  <div>
                    <h2 className="text-2xl font-bold text-gray-900">Program Manager</h2>
                    <p className="text-sm text-gray-500">For administrators</p>
                  </div>
                </div>
                <p className="text-gray-600 mb-4">
                  Manage teams, review assignments, configure settings, and oversee the entire program.
                </p>
                <div className="text-navy font-semibold group-hover:translate-x-2 transition-transform inline-block">
                  Enter PM Portal →
                </div>
              </button>
            </div>

            {/* Footer */}
            <div className="text-center mt-8 text-sm text-gray-400">
              UNC Kairos Accelerator Program
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // TEAM PORTAL AUTHENTICATION
    // ============================================================

    function TeamAuth({ onAuthenticate }) {
      const [teams, setTeams] = useState([]);
      const [selectedTeam, setSelectedTeam] = useState('');
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const unsubscribe = db.collection('teams').onSnapshot((snapshot) => {
          const teamsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setTeams(teamsData);
          setLoading(false);
        }, (error) => {
          console.error('Error loading teams:', error);
          setLoading(false);
        });

        return () => unsubscribe();
      }, []);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (selectedTeam) {
          const team = teams.find(t => t.id === selectedTeam);
          onAuthenticate(team);
        }
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center" style={{ background: '#EDF4FB' }}>
            <div className="text-center">
              <div className="text-4xl mb-4">⏳</div>
              <div className="text-gray-600 font-semibold">Loading teams...</div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex items-center justify-center" style={{ background: '#EDF4FB' }}>
          <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
            <div className="text-center mb-6">
              <div className="text-4xl mb-3">👥</div>
              <h2 className="text-2xl font-bold text-gray-900 mb-2">Team Portal</h2>
              <p className="text-gray-600">Select your team to continue</p>
            </div>

            <form onSubmit={handleSubmit}>
              <div className="mb-6">
                <label className="block text-sm font-medium text-gray-700 mb-2">
                  Your Team
                </label>
                <select
                  value={selectedTeam}
                  onChange={(e) => setSelectedTeam(e.target.value)}
                  required
                  className="w-full border border-gray-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-carolina"
                >
                  <option value="">-- Select your team --</option>
                  {teams.map(team => (
                    <option key={team.id} value={team.id}>{team.name}</option>
                  ))}
                </select>
              </div>

              <button
                type="submit"
                style={{ background: '#4B9CD3' }}
                className="w-full text-white py-3 rounded-lg font-semibold hover:opacity-90 transition-opacity"
              >
                Continue
              </button>

              <button
                type="button"
                onClick={() => window.location.reload()}
                className="w-full mt-3 text-gray-600 py-3 rounded-lg font-medium hover:bg-gray-50 transition-colors"
              >
                ← Back to Portal Selection
              </button>
            </form>

            {teams.length === 0 && (
              <div className="mt-4 p-4 bg-yellow-50 border border-yellow-200 rounded-lg text-sm text-yellow-800">
                No teams found. Please contact your program manager to create teams.
              </div>
            )}
          </div>
        </div>
      );
    }

    // ============================================================
    // PM PORTAL AUTHENTICATION
    // ============================================================

    function PMAuth({ onAuthenticate }) {
      const [pin, setPin] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');

        try {
          const settingsDoc = await db.collection('settings').doc('program').get();
          const storedPin = settingsDoc.exists ? settingsDoc.data().pmPin : '1234';

          if (pin === storedPin) {
            onAuthenticate();
          } else {
            setError('Incorrect PIN. Please try again.');
            setPin('');
          }
        } catch (err) {
          console.error('Error verifying PIN:', err);
          setError('Error verifying PIN. Please try again.');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center" style={{ background: '#EDF4FB' }}>
          <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
            <div className="text-center mb-6">
              <div className="text-4xl mb-3">🔒</div>
              <h2 className="text-2xl font-bold text-gray-900 mb-2">Program Manager Portal</h2>
              <p className="text-gray-600">Enter your PIN to continue</p>
            </div>

            <form onSubmit={handleSubmit}>
              <div className="mb-6">
                <label className="block text-sm font-medium text-gray-700 mb-2">
                  PIN Code
                </label>
                <input
                  type="password"
                  value={pin}
                  onChange={(e) => setPin(e.target.value)}
                  required
                  maxLength="6"
                  placeholder="Enter PIN"
                  className="w-full border border-gray-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-navy text-center text-2xl tracking-widest"
                />
                {error && (
                  <div className="mt-2 text-sm text-red-600">{error}</div>
                )}
              </div>

              <button
                type="submit"
                disabled={loading}
                style={{ background: '#13294B' }}
                className="w-full text-white py-3 rounded-lg font-semibold hover:opacity-90 transition-opacity disabled:opacity-50"
              >
                {loading ? 'Verifying...' : 'Continue'}
              </button>

              <button
                type="button"
                onClick={() => window.location.reload()}
                className="w-full mt-3 text-gray-600 py-3 rounded-lg font-medium hover:bg-gray-50 transition-colors"
              >
                ← Back to Portal Selection
              </button>
            </form>

            <div className="mt-6 p-4 bg-gray-50 rounded-lg text-xs text-gray-500 text-center">
              Default PIN: 1234 (changeable in Settings)
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // PROGRAM STRUCTURE CONSTANTS
    // ============================================================

    const PROGRAM_STRUCTURE = {
      phases: {
        'Pre-Program': { months: ['M0'], color: '#10B981' },
        'Problem Validation': { months: ['M1', 'M2'], color: '#3B82F6' },
        'Solution Design': { months: ['M3'], color: '#8B5CF6' },
        'Pilot/Traction': { months: ['M4', 'M5'], color: '#F59E0B' },
        'Demo Day': { months: ['M6'], color: '#EF4444' }
      },
      gates: {
        M0: {
          name: 'Onboarding',
          phase: 'Pre-Program',
          checklist: [
            'Complete team profile',
            'Review program expectations',
            'Set up communication channels',
            'Identify initial problem space'
          ]
        },
        M1: {
          name: 'Problem Discovery',
          phase: 'Problem Validation',
          checklist: [
            'Conduct 15+ customer interviews',
            'Document problem hypotheses',
            'Identify target customer segments',
            'Create problem statement'
          ]
        },
        M2: {
          name: 'Problem Validation',
          phase: 'Problem Validation',
          checklist: [
            'Reach 30 total customer calls',
            'Validate problem-solution fit',
            'Define value proposition',
            'Present problem validation findings'
          ],
          hasDecision: true
        },
        M3: {
          name: 'Solution Design',
          phase: 'Solution Design',
          checklist: [
            'Create solution prototype/mockup',
            'Test solution with customers',
            'Refine value proposition',
            'Develop go-to-market strategy'
          ]
        },
        M4: {
          name: 'Pilot Launch',
          phase: 'Pilot/Traction',
          checklist: [
            'Reach 50 total customer calls',
            'Launch pilot with early customers',
            'Collect user feedback',
            'Track key metrics'
          ],
          hasDecision: true
        },
        M5: {
          name: 'Traction & Growth',
          phase: 'Pilot/Traction',
          checklist: [
            'Reach 70 total customer calls',
            'Demonstrate traction metrics',
            'Refine business model',
            'Prepare demo day presentation'
          ]
        },
        M6: {
          name: 'Demo Day',
          phase: 'Demo Day',
          checklist: [
            'Finalize pitch deck',
            'Practice presentation',
            'Present at Demo Day',
            'Celebrate achievements!'
          ],
          hasDecision: true
        }
      },
      callTargets: [15, 30, 50, 70]
    };

    // ============================================================
    // TEAM PORTAL
    // ============================================================

    function TeamPortal({ team }) {
      const [activeTab, setActiveTab] = useState('home');
      const [teamData, setTeamData] = useState(team);
      const [meetings, setMeetings] = useState([]);
      const [settings, setSettings] = useState(null);
      const [loading, setLoading] = useState(true);

      // Real-time listeners for team data
      useEffect(() => {
        const unsubscribeTeam = db.collection('teams').doc(team.id).onSnapshot((doc) => {
          if (doc.exists) {
            setTeamData({ id: doc.id, ...doc.data() });
          }
        });

        const unsubscribeMeetings = db.collection('schedule').onSnapshot((snapshot) => {
          const meetingsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setMeetings(meetingsData.sort((a, b) => {
            const orderM = ['M0', 'M1', 'M2', 'M3', 'M4', 'M5', 'M6'];
            return orderM.indexOf(a.meetingName) - orderM.indexOf(b.meetingName);
          }));
        });

        const unsubscribeSettings = db.collection('settings').doc('program').onSnapshot((doc) => {
          if (doc.exists) {
            setSettings(doc.data());
          }
          setLoading(false);
        });

        return () => {
          unsubscribeTeam();
          unsubscribeMeetings();
          unsubscribeSettings();
        };
      }, [team.id]);

      const tabs = [
        { id: 'home', label: 'Home', icon: '🏠' },
        { id: 'work', label: 'Work', icon: '✅' },
        { id: 'calls', label: 'Calls (CRM)', icon: '📞' },
        { id: 'schedule', label: 'Schedule', icon: '📅' },
        { id: 'resources', label: 'Resources', icon: '📚' }
      ];

      return (
        <div className="min-h-screen" style={{ background: '#EDF4FB' }}>
          {/* Header */}
          <div style={{ background: '#13294B' }} className="shadow-md">
            <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div style={{ background: '#4B9CD3' }} className="w-8 h-8 rounded-lg flex items-center justify-center font-black text-white text-base">K</div>
                <div>
                  <div className="text-white font-bold text-base">Team Portal</div>
                  <div className="text-white/60 text-xs">{teamData.name}</div>
                </div>
              </div>
              <button
                onClick={() => window.location.reload()}
                className="text-white/60 hover:text-white text-sm"
              >
                Logout
              </button>
            </div>
          </div>

          {/* Tab Navigation */}
          <div className="bg-white border-b border-gray-200">
            <div className="max-w-7xl mx-auto px-4">
              <div className="flex gap-1 overflow-x-auto">
                {tabs.map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`px-4 py-3 font-medium text-sm whitespace-nowrap transition-colors ${
                      activeTab === tab.id
                        ? 'text-carolina border-b-2 border-carolina'
                        : 'text-gray-600 hover:text-gray-900'
                    }`}
                  >
                    <span className="mr-2">{tab.icon}</span>
                    {tab.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Tab Content */}
          <div className="max-w-7xl mx-auto px-4 py-6">
            {loading ? (
              <div className="text-center py-12">
                <div className="text-4xl mb-4">⏳</div>
                <div className="text-gray-600">Loading...</div>
              </div>
            ) : (
              <>
                {activeTab === 'home' && <HomeTab teamData={teamData} meetings={meetings} />}
                {activeTab === 'work' && <WorkTab teamData={teamData} setTeamData={setTeamData} />}
                {activeTab === 'calls' && <CallsTab teamData={teamData} settings={settings} />}
                {activeTab === 'schedule' && <ScheduleTab meetings={meetings} teamData={teamData} />}
                {activeTab === 'resources' && <ResourcesTab settings={settings} />}
              </>
            )}
          </div>
        </div>
      );
    }

    // Home Tab Component
    function HomeTab({ teamData, meetings }) {
      const currentGate = teamData.currentGate || 'M0';
      const gateInfo = PROGRAM_STRUCTURE.gates[currentGate];
      const phase = gateInfo?.phase || 'Pre-Program';
      
      // Calculate overall progress
      const calculateProgress = () => {
        if (!teamData.gates) return 0;
        const gates = Object.keys(PROGRAM_STRUCTURE.gates);
        const completed = gates.filter(g => teamData.gates[g]?.completionPercentage === 100).length;
        return Math.round((completed / gates.length) * 100);
      };

      const progress = calculateProgress();
      
      // Find next meeting
      const now = new Date();
      const upcomingMeetings = meetings.filter(m => {
        if (!m.date) return false;
        const meetingDate = m.date.toDate ? m.date.toDate() : new Date(m.date);
        return meetingDate > now;
      });
      const nextMeeting = upcomingMeetings[0];

      return (
        <div className="space-y-6">
          {/* Welcome Card */}
          <div className="bg-gradient-to-r from-carolina to-blue-600 rounded-xl p-8 text-white">
            <h2 className="text-3xl font-bold mb-2">Welcome back, {teamData.name}!</h2>
            <p className="text-blue-100">Track your progress and stay on top of your program milestones.</p>
          </div>

          <div className="grid md:grid-cols-2 gap-6">
            {/* Progress Card */}
            <div className="bg-white rounded-xl p-6 shadow-sm">
              <h3 className="text-lg font-bold text-gray-900 mb-4">Overall Progress</h3>
              <div className="mb-4">
                <div className="flex justify-between text-sm mb-2">
                  <span className="text-gray-600">Program Completion</span>
                  <span className="font-bold text-carolina">{progress}%</span>
                </div>
                <div className="w-full bg-gray-200 rounded-full h-3">
                  <div
                    className="h-3 rounded-full transition-all"
                    style={{ width: `${progress}%`, background: '#4B9CD3' }}
                  />
                </div>
              </div>
              <div className="space-y-2 text-sm">
                <div className="flex justify-between">
                  <span className="text-gray-600">Current Gate:</span>
                  <span className="font-semibold">{currentGate} - {gateInfo?.name}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-gray-600">Current Phase:</span>
                  <span className="font-semibold">{phase}</span>
                </div>
              </div>
            </div>

            {/* Next Meeting Card */}
            <div className="bg-white rounded-xl p-6 shadow-sm">
              <h3 className="text-lg font-bold text-gray-900 mb-4">Next Meeting</h3>
              {nextMeeting ? (
                <div>
                  <div className="text-2xl font-bold text-carolina mb-2">{nextMeeting.meetingName}</div>
                  <div className="space-y-2 text-sm">
                    <div className="flex items-center gap-2 text-gray-600">
                      <span>📅</span>
                      <span>{nextMeeting.date?.toDate ? nextMeeting.date.toDate().toLocaleDateString() : 'TBD'}</span>
                    </div>
                    {nextMeeting.zoomLink && (
                      <a
                        href={nextMeeting.zoomLink}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="inline-flex items-center gap-2 text-carolina hover:underline"
                      >
                        <span>🔗</span>
                        <span>Join Zoom Meeting</span>
                      </a>
                    )}
                  </div>
                </div>
              ) : (
                <div className="text-gray-500 text-sm">No upcoming meetings scheduled</div>
              )}
            </div>
          </div>

          {/* Current Gate Status */}
          <div className="bg-white rounded-xl p-6 shadow-sm">
            <h3 className="text-lg font-bold text-gray-900 mb-4">Current Gate: {gateInfo?.name}</h3>
            <div className="space-y-3">
              {gateInfo?.checklist.map((item, idx) => {
                const isComplete = teamData.gates?.[currentGate]?.checklist?.[`item${idx}`] || false;
                return (
                  <div key={idx} className="flex items-center gap-3">
                    <div className={`w-5 h-5 rounded border-2 flex items-center justify-center ${
                      isComplete ? 'bg-green-500 border-green-500' : 'border-gray-300'
                    }`}>
                      {isComplete && <span className="text-white text-xs">✓</span>}
                    </div>
                    <span className={isComplete ? 'text-gray-400 line-through' : 'text-gray-700'}>{item}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // Work Tab Component
    function WorkTab({ teamData, setTeamData }) {
      const currentGate = teamData.currentGate || 'M0';
      const [submitting, setSubmitting] = useState(false);

      const toggleChecklistItem = async (gate, itemKey) => {
        try {
          const currentValue = teamData.gates?.[gate]?.checklist?.[itemKey] || false;
          await db.collection('teams').doc(teamData.id).update({
            [`gates.${gate}.checklist.${itemKey}`]: !currentValue
          });
        } catch (error) {
          console.error('Error updating checklist:', error);
          alert('Failed to update checklist. Please try again.');
        }
      };

      const submitAssignment = async (assignmentId) => {
        if (!confirm('Submit this assignment for review?')) return;
        
        setSubmitting(true);
        try {
          await db.collection('teams').doc(teamData.id).update({
            [`assignments.${assignmentId}.status`]: 'Submitted',
            [`assignments.${assignmentId}.submittedAt`]: firebase.firestore.FieldValue.serverTimestamp()
          });
          alert('Assignment submitted successfully!');
        } catch (error) {
          console.error('Error submitting assignment:', error);
          alert('Failed to submit assignment. Please try again.');
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <div className="space-y-6">
          <div className="bg-white rounded-xl p-6 shadow-sm">
            <h2 className="text-2xl font-bold text-gray-900 mb-6">Gate Checklists & Assignments</h2>
            
            {/* Current Gate Checklist */}
            <div className="mb-8">
              <h3 className="text-lg font-bold text-gray-900 mb-4">
                {currentGate} - {PROGRAM_STRUCTURE.gates[currentGate]?.name}
              </h3>
              <div className="space-y-3">
                {PROGRAM_STRUCTURE.gates[currentGate]?.checklist.map((item, idx) => {
                  const itemKey = `item${idx}`;
                  const isComplete = teamData.gates?.[currentGate]?.checklist?.[itemKey] || false;
                  return (
                    <button
                      key={idx}
                      onClick={() => toggleChecklistItem(currentGate, itemKey)}
                      className="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-gray-50 transition-colors text-left"
                    >
                      <div className={`w-6 h-6 rounded border-2 flex items-center justify-center flex-shrink-0 ${
                        isComplete ? 'bg-green-500 border-green-500' : 'border-gray-300'
                      }`}>

                          assignment.status === 'Submitted' ? 'bg-blue-100 text-blue-800' :
                          assignment.status === 'Changes Requested' ? 'bg-yellow-100 text-yellow-800' :
                          assignment.status === 'In Progress' ? 'bg-purple-100 text-purple-800' :
                          'bg-gray-100 text-gray-800'

                      </div>
                      {assignment.feedback && (
                        <div className="mt-3 p-3 bg-yellow-50 border border-yellow-200 rounded text-sm">
                          <div className="font-semibold text-yellow-900 mb-1">PM Feedback:</div>

                        <button

                        >

                      )}

                  ))}
                </div>
              ) : (
                <div className="text-gray-500 text-sm">No assignments yet</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // PM PORTAL
    // ============================================================

    function PMPortal() {
      const [activeTab, setActiveTab] = useState('teams');
      const [teams, setTeams] = useState([]);
      const [cohorts, setCohorts] = useState([]);
      const [meetings, setMeetings] = useState([]);
      const [settings, setSettings] = useState(null);
      const [loading, setLoading] = useState(true);

      // Real-time listeners
      useEffect(() => {
        const unsubTeams = db.collection('teams').onSnapshot((snapshot) => {
          setTeams(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });

        const unsubCohorts = db.collection('cohorts').onSnapshot((snapshot) => {
          setCohorts(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });

        const unsubMeetings = db.collection('schedule').onSnapshot((snapshot) => {
          const meetingsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setMeetings(meetingsData.sort((a, b) => {
            const order = ['M0', 'M1', 'M2', 'M3', 'M4', 'M5', 'M6'];
            return order.indexOf(a.meetingName) - order.indexOf(b.meetingName);
          }));
        });

        const unsubSettings = db.collection('settings').doc('program').onSnapshot((doc) => {
          if (doc.exists) {
            setSettings(doc.data());
          } else {
            // Initialize default settings
            const defaultSettings = {
              programName: 'Kairos Accelerator',
              pmPin: '1234',
              canvasUrl: '',
              crmUrl: '',
              airtableUrl: ''
            };
            db.collection('settings').doc('program').set(defaultSettings);
            setSettings(defaultSettings);
          }
          setLoading(false);
        });

        return () => {
          unsubTeams();
          unsubCohorts();
          unsubMeetings();
          unsubSettings();
        };
      }, []);

      const tabs = [
        { id: 'teams', label: 'Teams', icon: '👥' },
        { id: 'review', label: 'Review Queue', icon: '📝' },
        { id: 'schedule', label: 'Schedule', icon: '📅' },
        { id: 'settings', label: 'Settings', icon: '⚙️' }
      ];

      return (
        <div className="min-h-screen" style={{ background: '#EDF4FB' }}>
          {/* Header */}
          <div style={{ background: '#13294B' }} className="shadow-md">
            <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div style={{ background: '#4B9CD3' }} className="w-8 h-8 rounded-lg flex items-center justify-center font-black text-white text-base">K</div>
                <div>
                  <div className="text-white font-bold text-base">Program Manager Portal</div>
                  <div className="text-white/60 text-xs">{settings?.programName || 'Administrator'}</div>
                </div>
              </div>
              <button
                onClick={() => window.location.reload()}
                className="text-white/60 hover:text-white text-sm"
              >
                Logout
              </button>
            </div>
          </div>

          {/* Tab Navigation */}
          <div className="bg-white border-b border-gray-200">
            <div className="max-w-7xl mx-auto px-4">
              <div className="flex gap-1 overflow-x-auto">
                {tabs.map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`px-4 py-3 font-medium text-sm whitespace-nowrap transition-colors ${
                      activeTab === tab.id
                        ? 'text-navy border-b-2 border-navy'
                        : 'text-gray-600 hover:text-gray-900'
                    }`}
                  >
                    <span className="mr-2">{tab.icon}</span>
                    {tab.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Tab Content */}
          <div className="max-w-7xl mx-auto px-4 py-6">
            {loading ? (
              <div className="text-center py-12">
                <div className="text-4xl mb-4">⏳</div>
                <div className="text-gray-600">Loading...</div>
              </div>
            ) : (
              <>
                {activeTab === 'teams' && <PMTeamsTab teams={teams} cohorts={cohorts} setTeams={setTeams} setCohorts={setCohorts} />}
                {activeTab === 'review' && <PMReviewTab teams={teams} />}
                {activeTab === 'schedule' && <PMScheduleTab meetings={meetings} cohorts={cohorts} />}
                {activeTab === 'settings' && <PMSettingsTab settings={settings} setSettings={setSettings} />}
              </>
            )}
          </div>
        </div>
      );
    }

    // PM Teams Tab
    function PMTeamsTab({ teams, cohorts, setTeams, setCohorts }) {
      const [showNewTeamForm, setShowNewTeamForm] = useState(false);
      const [showNewCohortForm, setShowNewCohortForm] = useState(false);
      const [newTeamName, setNewTeamName] = useState('');
      const [selectedCohort, setSelectedCohort] = useState('');
      const [newCohortName, setNewCohortName] = useState('');

      const createTeam = async (e) => {
        e.preventDefault();
        if (!newTeamName || !selectedCohort) return;

        try {
          await db.collection('teams').add({
            name: newTeamName,
            cohortId: selectedCohort,
            currentGate: 'M0',
            currentPhase: 'Pre-Program',
            gates: {},
            assignments: {},
            callCount: 0,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          setNewTeamName('');
          setSelectedCohort('');
          setShowNewTeamForm(false);
          alert('Team created successfully!');
        } catch (error) {
          console.error('Error creating team:', error);
          alert('Failed to create team');
        }
      };

      const createCohort = async (e) => {
        e.preventDefault();
        if (!newCohortName) return;

        try {
          await db.collection('cohorts').add({
            name: newCohortName,
            startDate: firebase.firestore.FieldValue.serverTimestamp(),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          setNewCohortName('');
          setShowNewCohortForm(false);
          alert('Cohort created successfully!');
        } catch (error) {
          console.error('Error creating cohort:', error);
          alert('Failed to create cohort');
        }
      };

      const deleteTeam = async (teamId, teamName) => {
        if (!confirm(`Delete team "${teamName}"? This cannot be undone.`)) return;

        try {
          await db.collection('teams').doc(teamId).delete();
          alert('Team deleted successfully');
        } catch (error) {
          console.error('Error deleting team:', error);
          alert('Failed to delete team');
        }
      };

      return (
        <div className="space-y-6">
          {/* Cohorts Section */}
          <div className="bg-white rounded-xl p-6 shadow-sm">
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-2xl font-bold text-gray-900">Cohorts</h2>
              <button
                onClick={() => setShowNewCohortForm(!showNewCohortForm)}
                className="px-4 py-2 bg-navy text-white rounded-lg hover:opacity-90 text-sm font-medium"
              >
                + New Cohort
              </button>
            </div>

            {showNewCohortForm && (
              <form onSubmit={createCohort} className="mb-4 p-4 bg-gray-50 rounded-lg">
                <input
                  type="text"
                  value={newCohortName}
                  onChange={(e) => setNewCohortName(e.target.value)}
                  placeholder="Cohort name (e.g., Spring 2024)"
                  required
                  className="w-full border border-gray-300 rounded-lg px-4 py-2 mb-3"
                />
                <div className="flex gap-2">
                  <button type="submit" className="px-4 py-2 bg-navy text-white rounded-lg hover:opacity-90 text-sm">
                    Create
                  </button>
                  <button
                    type="button"
                    onClick={() => setShowNewCohortForm(false)}
                    className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 text-sm"
                  >
                    Cancel
                  </button>
                </div>
              </form>
            )}

            <div className="grid md:grid-cols-2 gap-4">
              {cohorts.map(cohort => (
                <div key={cohort.id} className="border border-gray-200 rounded-lg p-4">
                  <h3 className="font-bold text-gray-900">{cohort.name}</h3>
                  <p className="text-sm text-gray-500">
                    {teams.filter(t => t.cohortId === cohort.id).length} teams
                  </p>
                </div>
              ))}
              {cohorts.length === 0 && (
                <div className="text-gray-500 text-sm col-span-2">No cohorts yet. Create one to get started.</div>
              )}
            </div>
          </div>

          {/* Teams Section */}
          <div className="bg-white rounded-xl p-6 shadow-sm">
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-2xl font-bold text-gray-900">Teams</h2>
              <button
                onClick={() => setShowNewTeamForm(!showNewTeamForm)}
                className="px-4 py-2 bg-carolina text-white rounded-lg hover:opacity-90 text-sm font-medium"
                disabled={cohorts.length === 0}
              >
                + New Team
              </button>
            </div>

            {showNewTeamForm && (
              <form onSubmit={createTeam} className="mb-4 p-4 bg-gray-50 rounded-lg">
                <input
                  type="text"
                  value={newTeamName}
                  onChange={(e) => setNewTeamName(e.target.value)}
                  placeholder="Team name"
                  required
                  className="w-full border border-gray-300 rounded-lg px-4 py-2 mb-3"
                />
                <select
                  value={selectedCohort}
                  onChange={(e) => setSelectedCohort(e.target.value)}
                  required
                  className="w-full border border-gray-300 rounded-lg px-4 py-2 mb-3"
                >
                  <option value="">Select cohort</option>
                  {cohorts.map(cohort => (
                    <option key={cohort.id} value={cohort.id}>{cohort.name}</option>
                  ))}
                </select>
                <div className="flex gap-2">
                  <button type="submit" className="px-4 py-2 bg-carolina text-white rounded-lg hover:opacity-90 text-sm">
                    Create
                  </button>
                  <button
                    type="button"
                    onClick={() => setShowNewTeamForm(false)}
                    className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 text-sm"
                  >
                    Cancel
                  </button>
                </div>
              </form>
            )}

            <div className="space-y-3">
              {teams.map(team => {
                const cohort = cohorts.find(c => c.id === team.cohortId);
                return (
                  <div key={team.id} className="border border-gray-200 rounded-lg p-4 flex justify-between items-center">
                    <div>
                      <h3 className="font-bold text-gray-900">{team.name}</h3>
                      <p className="text-sm text-gray-500">
                        Cohort: {cohort?.name || 'Unknown'} | Gate: {team.currentGate || 'M0'}
                      </p>
                    </div>
                    <button
                      onClick={() => deleteTeam(team.id, team.name)}
                      className="px-3 py-1 text-red-600 hover:bg-red-50 rounded text-sm"
                    >
                      Delete
                    </button>
                  </div>
                );
              })}
              {teams.length === 0 && (
                <div className="text-gray-500 text-sm">No teams yet. Create a cohort first, then add teams.</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // PM Review Tab
    function PMReviewTab({ teams }) {
      const [feedback, setFeedback] = useState({});

      const submittedAssignments = teams.flatMap(team =>
        Object.entries(team.assignments || {})
          .filter(([_, assignment]) => assignment.status === 'Submitted')
          .map(([id, assignment]) => ({
            teamId: team.id,
            teamName: team.name,
            assignmentId: id,
            ...assignment
          }))
      );

      const reviewAssignment = async (teamId, assignmentId, status, feedbackText) => {
        try {
          await db.collection('teams').doc(teamId).update({
            [`assignments.${assignmentId}.status`]: status,
            [`assignments.${assignmentId}.feedback`]: feedbackText || '',
            [`assignments.${assignmentId}.reviewedAt`]: firebase.firestore.FieldValue.serverTimestamp()
          });
          setFeedback({ ...feedback, [assignmentId]: '' });
          alert(`Assignment ${status.toLowerCase()} successfully!`);
        } catch (error) {
          console.error('Error reviewing assignment:', error);
          alert('Failed to review assignment');
        }
      };

      return (
        <div className="space-y-6">
          <div className="bg-white rounded-xl p-6 shadow-sm">
            <h2 className="text-2xl font-bold text-gray-900 mb-6">Review Queue</h2>
            {submittedAssignments.length > 0 ? (
              <div className="space-y-4">
                {submittedAssignments.map(assignment => (
                  <div key={`${assignment.teamId}-${assignment.assignmentId}`} className="border border-gray-200 rounded-lg p-4">
                    <div className="flex justify-between items-start mb-3">
                      <div>
                        <h3 className="font-bold text-gray-900">{assignment.name}</h3>
                        <p className="text-sm text-gray-500">Team: {assignment.teamName} | Gate: {assignment.gate}</p>
                      </div>
                      <span className="px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                        Submitted
                      </span>
                    </div>
                    <textarea
                      value={feedback[assignment.assignmentId] || ''}
                      onChange={(e) => setFeedback({ ...feedback, [assignment.assignmentId]: e.target.value })}
                      placeholder="Add feedback..."
                      className="w-full border border-gray-300 rounded-lg px-4 py-2 mb-3 text-sm"
                      rows="3"
                    />
                    <div className="flex gap-2">
                      <button
                        onClick={() => reviewAssignment(assignment.teamId, assignment.assignmentId, 'Approved', feedback[assignment.assignmentId])}
                        className="px-4 py-2 bg-green-600 text-white rounded-lg hover:opacity-90 text-sm"
                      >
                        ✓ Approve
                      </button>
                      <button
                        onClick={() => reviewAssignment(assignment.teamId, assignment.assignmentId, 'Changes Requested', feedback[assignment.assignmentId])}
                        className="px-4 py-2 bg-yellow-600 text-white rounded-lg hover:opacity-90 text-sm"
                      >
                        ↩ Request Changes
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            ) : (
              <div className="text-center py-12 text-gray-500">
                <div className="text-4xl mb-4">📝</div>
                <p>No assignments to review</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    // PM Schedule Tab
    function PMScheduleTab({ meetings, cohorts }) {
      const [showNewMeetingForm, setShowNewMeetingForm] = useState(false);
      const [editingMeeting, setEditingMeeting] = useState(null);
      const [formData, setFormData] = useState({ meetingName: '', date: '', zoomLink: '' });

      const saveMeeting = async (e) => {
        e.preventDefault();
        try {
          if (editingMeeting) {
            await db.collection('schedule').doc(editingMeeting.id).update({
              ...formData,
              date: formData.date ? firebase.firestore.Timestamp.fromDate(new Date(formData.date)) : null,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert('Meeting updated successfully!');
          } else {
            await db.collection('schedule').add({
              ...formData,
              date: formData.date ? firebase.firestore.Timestamp.fromDate(new Date(formData.date)) : null,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert('Meeting created successfully!');
          }
          setFormData({ meetingName: '', date: '', zoomLink: '' });
          setShowNewMeetingForm(false);
          setEditingMeeting(null);
        } catch (error) {
          console.error('Error saving meeting:', error);
          alert('Failed to save meeting');
        }
      };

      const deleteMeeting = async (meetingId, meetingName) => {
        if (!confirm(`Delete meeting "${meetingName}"?`)) return;
        try {
          await db.collection('schedule').doc(meetingId).delete();
          alert('Meeting deleted successfully');
        } catch (error) {
          console.error('Error deleting meeting:', error);
          alert('Failed to delete meeting');
        }
      };

      const editMeeting = (meeting) => {
        setEditingMeeting(meeting);
        setFormData({
          meetingName: meeting.meetingName,
          date: meeting.date?.toDate ? meeting.date.toDate().toISOString().split('T')[0] : '',
          zoomLink: meeting.zoomLink || ''
        });
        setShowNewMeetingForm(true);
      };

      return (
        <div className="space-y-6">
          <div className="bg-white rounded-xl p-6 shadow-sm">
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-2xl font-bold text-gray-900">Program Schedule</h2>
              <button
                onClick={() => {
                  setShowNewMeetingForm(!showNewMeetingForm);
                  setEditingMeeting(null);
                  setFormData({ meetingName: '', date: '', zoomLink: '' });
                }}
                className="px-4 py-2 bg-navy text-white rounded-lg hover:opacity-90 text-sm font-medium"
              >
                + New Meeting
              </button>
            </div>

            {showNewMeetingForm && (
              <form onSubmit={saveMeeting} className="mb-4 p-4 bg-gray-50 rounded-lg">
                <select
                  value={formData.meetingName}
                  onChange={(e) => setFormData({ ...formData, meetingName: e.target.value })}
                  required
                  className="w-full border border-gray-300 rounded-lg px-4 py-2 mb-3"
                >
                  <option value="">Select meeting</option>
                  {['M0', 'M1', 'M2', 'M3', 'M4', 'M5', 'M6'].map(m => (
                    <option key={m} value={m}>{m} - {PROGRAM_STRUCTURE.gates[m].name}</option>
                  ))}
                </select>
                <input
                  type="date"
                  value={formData.date}
                  onChange={(e) => setFormData({ ...formData, date: e.target.value })}
                  required
                  className="w-full border border-gray-300 rounded-lg px-4 py-2 mb-3"
                />
                <input
                  type="url"
                  value={formData.zoomLink}
                  onChange={(e) => setFormData({ ...formData, zoomLink: e.target.value })}
                  placeholder="Zoom link (optional)"
                  className="w-full border border-gray-300 rounded-lg px-4 py-2 mb-3"
                />
                <div className="flex gap-2">
                  <button type="submit" className="px-4 py-2 bg-navy text-white rounded-lg hover:opacity-90 text-sm">
                    {editingMeeting ? 'Update' : 'Create'}
                  </button>
                  <button
                    type="button"
                    onClick={() => {
                      setShowNewMeetingForm(false);
                      setEditingMeeting(null);
                      setFormData({ meetingName: '', date: '', zoomLink: '' });
                    }}
                    className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 text-sm"
                  >
                    Cancel
                  </button>
                </div>
              </form>
            )}

            <div className="space-y-3">
              {meetings.map(meeting => (
                <div key={meeting.id} className="border border-gray-200 rounded-lg p-4">
                  <div className="flex justify-between items-start">
                    <div>
                      <h3 className="font-bold text-gray-900">{meeting.meetingName} - {PROGRAM_STRUCTURE.gates[meeting.meetingName]?.name}</h3>
                      <p className="text-sm text-gray-500">
                        {meeting.date?.toDate ? meeting.date.toDate().toLocaleDateString('en-US', {
                          weekday: 'long',
                          year: 'numeric',
                          month: 'long',
                          day: 'numeric'
                        }) : 'Date TBD'}
                      </p>
                      {meeting.zoomLink && (
                        <a href={meeting.zoomLink} target="_blank" rel="noopener noreferrer" className="text-sm text-carolina hover:underline">
                          Zoom Link
                        </a>
                      )}
                    </div>
                    <div className="flex gap-2">
                      <button
                        onClick={() => editMeeting(meeting)}
                        className="px-3 py-1 text-carolina hover:bg-blue-50 rounded text-sm"
                      >
                        Edit
                      </button>
                      <button
                        onClick={() => deleteMeeting(meeting.id, meeting.meetingName)}
                        className="px-3 py-1 text-red-600 hover:bg-red-50 rounded text-sm"
                      >
                        Delete
                      </button>
                    </div>
                  </div>
                </div>
              ))}
              {meetings.length === 0 && (
                <div className="text-gray-500 text-sm">No meetings scheduled yet</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // PM Settings Tab
    function PMSettingsTab({ settings, setSettings }) {
      const [formData, setFormData] = useState(settings || {});
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        if (settings) {
          setFormData(settings);
        }
      }, [settings]);

      const saveSettings = async (e) => {
        e.preventDefault();
        setSaving(true);
        try {
          await db.collection('settings').doc('program').set({
            ...formData,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          alert('Settings saved successfully!');
        } catch (error) {
          console.error('Error saving settings:', error);
          alert('Failed to save settings');
        } finally {
          setSaving(false);
        }
      };

      return (
        <div className="space-y-6">
          <div className="bg-white rounded-xl p-6 shadow-sm">
            <h2 className="text-2xl font-bold text-gray-900 mb-6">Program Settings</h2>
            <form onSubmit={saveSettings} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Program Name</label>
                <input
                  type="text"
                  value={formData.programName || ''}
                  onChange={(e) => setFormData({ ...formData, programName: e.target.value })}
                  className="w-full border border-gray-300 rounded-lg px-4 py-2"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Canvas URL</label>
                <input
                  type="url"
                  value={formData.canvasUrl || ''}
                  onChange={(e) => setFormData({ ...formData, canvasUrl: e.target.value })}
                  placeholder="https://canvas.unc.edu/..."
                  className="w-full border border-gray-300 rounded-lg px-4 py-2"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">CRM URL</label>
                <input
                  type="url"
                  value={formData.crmUrl || ''}
                  onChange={(e) => setFormData({ ...formData, crmUrl: e.target.value })}
                  placeholder="https://..."
                  className="w-full border border-gray-300 rounded-lg px-4 py-2"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Airtable URL (for call logging)</label>
                <input
                  type="url"
                  value={formData.airtableUrl || ''}
                  onChange={(e) => setFormData({ ...formData, airtableUrl: e.target.value })}
                  placeholder="https://airtable.com/embed/..."
                  className="w-full border border-gray-300 rounded-lg px-4 py-2"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">PM PIN</label>
                <input
                  type="text"
                  value={formData.pmPin || ''}
                  onChange={(e) => setFormData({ ...formData, pmPin: e.target.value })}
                  placeholder="1234"
                  maxLength="6"
                  className="w-full border border-gray-300 rounded-lg px-4 py-2"
                />
                <p className="text-xs text-gray-500 mt-1">Used to access the PM Portal</p>
              </div>

              <button
                type="submit"
                disabled={saving}
                className="px-6 py-3 bg-navy text-white rounded-lg hover:opacity-90 disabled:opacity-50 font-medium"
              >
                {saving ? 'Saving...' : 'Save Settings'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ============================================================
    // MAIN APP
    // ============================================================

    function App() {
      const [view, setView] = useState('portal-selection'); // portal-selection, team-auth, pm-auth, team-portal, pm-portal
      const [currentTeam, setCurrentTeam] = useState(null);

      const handlePortalSelection = (portal) => {
        if (portal === 'team') {
          setView('team-auth');
        } else if (portal === 'pm') {
          setView('pm-auth');
        }
      };

      const handleTeamAuth = (team) => {
        setCurrentTeam(team);
        setView('team-portal');
      };

      const handlePMAuth = () => {
        setView('pm-portal');
      };

      return (
        <div>
          {view === 'portal-selection' && <PortalSelection onSelectPortal={handlePortalSelection} />}
          {view === 'team-auth' && <TeamAuth onAuthenticate={handleTeamAuth} />}
          {view === 'pm-auth' && <PMAuth onAuthenticate={handlePMAuth} />}
          {view === 'team-portal' && currentTeam && <TeamPortal team={currentTeam} />}
          {view === 'pm-portal' && <PMPortal />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
