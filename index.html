    function PMAuthModal({ settings, onAuth, onBack }) {
      const [pin, setPin] = useState('');
      const [err, setErr] = useState('');

      const submit = (e) => {
        e.preventDefault();
        if (pin === (settings.pmPin || '1234')) { onAuth(); }
        else { setErr('Incorrect PIN. Try again.'); setPin(''); }
      };

      return (
        <div className="min-h-screen flex items-center justify-center px-4" style={{ background: '#EDF4FB' }}>
          <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8">
            <div className="text-center mb-6">
              <div style={{ background: '#13294B' }} className="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-3">
                <span className="text-white text-2xl">&#9670;</span>
              </div>
              <div className="font-bold text-gray-900 text-xl">Program Manager</div>
              <div className="text-sm text-gray-400 mt-1">Enter your PIN to continue</div>
            </div>
            <form onSubmit={submit}>
              <input type="password" value={pin} onChange={e => { setPin(e.target.value); setErr(''); }}
                placeholder="Enter PIN"
                maxLength={8}
                className="w-full border border-gray-300 rounded-xl px-4 py-3 text-center text-xl tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-200 mb-3" />
              {err && <div className="text-red-500 text-sm text-center mb-3">{err}</div>}
              <button type="submit" style={{ background: '#13294B' }}
                className="w-full text-white py-3 rounded-xl font-semibold hover:opacity-90 mb-3">
                Unlock
              </button>
              <button type="button" onClick={onBack}
                className="w-full text-gray-400 text-sm hover:text-gray-600">
                Back to Portal Selection
              </button>

          </div>

    function PMReviewQueue({ teams, onUpdateTeam }) {
      const [comments, setComments] = useState({});
      const today = new Date().toISOString().split('T')[0];
      const [statusFilter, setStatusFilter] = useState('submitted');

      const items = [];
      teams.forEach(team => {
        MONTHS.forEach(m => {
          m.assignments.forEach(a => {
            const ad = team.assignments[m.id]?.[a.id];
            if (ad && (ad.status === 'submitted' || ad.status === 'changes_requested')) {
              items.push({ team, month: m, assignment: a, data: ad });
            }
          });
        });
      });
      items.sort((a, b) => {
        if (!a.data.submittedDate) return 1;
        if (!b.data.submittedDate) return -1;
        return b.data.submittedDate.localeCompare(a.data.submittedDate);
      });

      const filtered = statusFilter === 'all' ? items : items.filter(i => i.data.status === statusFilter);

      const ck = (t, mId, aId) => t.id + '_' + mId + '_' + aId;

      const approve = ({ team, month, assignment, data }) => {
        onUpdateTeam({ ...team, assignments: { ...team.assignments, [month.id]: { ...team.assignments[month.id], [assignment.id]: { ...data, status: 'approved', pmReviewDate: today } } } });
      };

      const requestChanges = ({ team, month, assignment, data }) => {
        const k = ck(team, month.id, assignment.id);
        onUpdateTeam({ ...team, assignments: { ...team.assignments, [month.id]: { ...team.assignments[month.id], [assignment.id]: { ...data, status: 'changes_requested', pmComment: comments[k] || '', pmReviewDate: today } } } });
        setComments(c => { const nc = { ...c }; delete nc[k]; return nc; });
      };

      return (
        <div className="max-w-4xl mx-auto px-4 py-6">
          <div className="flex items-center justify-between mb-5">
            <div>
              <div className="font-bold text-gray-900 text-lg">Review Queue</div>
              <div className="text-sm text-gray-500">{filtered.length} submission{filtered.length !== 1 ? 's' : ''}</div>
            </div>
            <div className="flex gap-2">
              {['submitted', 'changes_requested', 'all'].map(s => (
                <button key={s} onClick={() => setStatusFilter(s)}
                  style={{ background: statusFilter === s ? '#13294B' : 'white', color: statusFilter === s ? 'white' : '#6B7280', border: '1px solid #E5E7EB' }}
                  className="text-xs px-3 py-1.5 rounded-lg font-medium">
                  {s === 'submitted' ? 'New' : s === 'changes_requested' ? 'In Revision' : 'All'}
                  <span className="ml-1 opacity-70">({s === 'all' ? items.length : items.filter(i => i.data.status === s).length})</span>
                </button>
              ))}
            </div>
          </div>

          {filtered.length === 0 ? (
            <div className="text-center py-20 text-gray-400">
              <div className="text-lg mb-2">No submissions</div>
              <div className="text-sm">Assignment submissions will appear here for review.</div>
            </div>
          ) : (
            <div className="space-y-4">
              {filtered.map(item => {
                const { team, month, assignment, data } = item;
                const sc = STATUSES[data.status] || STATUSES.submitted;
                const k = ck(team, month.id, assignment.id);
                return (
                  <div key={k} className="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
                    <div style={{ background: sc.bg, borderBottom: `1px solid ${sc.color}20` }} className="px-4 py-3 flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <span style={{ background: pc(month.phase), color: 'white' }} className="text-xs font-bold px-2 py-0.5 rounded">{month.label}</span>
                        <span className="font-semibold text-gray-900">{team.name}</span>
                        {team.venture && <span className="text-gray-400 text-xs">- {team.venture}</span>}
                      </div>
                      <span style={{ color: sc.color, border: `1px solid ${sc.color}50` }} className="text-xs font-medium px-2 py-0.5 rounded-full">{sc.label}</span>
                    </div>
                    <div className="p-4">
                      <div className="font-medium text-gray-900 mb-0.5">{assignment.title}</div>
                      <div className="text-xs text-gray-400 mb-3">{assignment.desc}</div>
                      {data.link && (
                        <a href={data.link} target="_blank" rel="noreferrer"
                          className="text-xs text-blue-600 hover:underline block mb-2 truncate">{data.link}</a>
                      )}
                      {data.submittedDate && <div className="text-xs text-gray-400 mb-3">Submitted: {data.submittedDate}</div>}
                      {data.status === 'submitted' && (
                        <div className="space-y-2 pt-2 border-t border-gray-100">
                          <textarea value={comments[k] || ''} onChange={e => setComments(c => ({ ...c, [k]: e.target.value }))}
                            placeholder="Feedback for team (required when requesting changes)..."
                            rows={2}
                            className="w-full text-xs border border-gray-200 rounded-lg px-3 py-2 resize-none focus:outline-none focus:ring-1 focus:ring-blue-200" />
                          <div className="flex gap-2">
                            <button onClick={() => approve(item)} style={{ background: '#059669' }}
                              className="text-white text-sm px-4 py-2 rounded-lg font-semibold hover:opacity-90">Approve</button>
                            <button onClick={() => requestChanges(item)} style={{ background: '#DC2626' }}
                              className="text-white text-sm px-4 py-2 rounded-lg font-semibold hover:opacity-90">Request Changes</button>
                          </div>
                        </div>
                      )}
                      {data.status === 'changes_requested' && data.pmComment && (
                        <div className="mt-2 bg-red-50 border border-red-100 rounded-lg p-3 text-xs">
                          <div className="font-semibold text-red-700 mb-1">Changes requested:</div>
                          <div className="text-red-600">{data.pmComment}</div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function PMScheduleTab({ meetings, teams, cohorts, onUpdateMeetings }) {
      const [showAdd, setShowAdd] = useState(false);
      const [editMtg, setEditMtg] = useState(null);
      const [filterCohort, setFilterCohort] = useState('all');
      const now = new Date();

      const visibleMeetings = meetings.filter(m => {
        if (filterCohort === 'all') return true;
        if (filterCohort === 'none') return !m.cohortId;
        return m.cohortId === filterCohort;
      });

      const sorted = [...visibleMeetings].sort((a, b) => {
        if (!a.date && !b.date) return 0;
        if (!a.date) return 1;
        if (!b.date) return -1;
        return (a.date + (a.time || '')).localeCompare(b.date + (b.time || ''));
      });

      const saveMeeting = (m) => {
        const exists = meetings.find(x => x.id === m.id);
        onUpdateMeetings(exists ? meetings.map(x => x.id === m.id ? m : x) : [...meetings, m]);
      };

      const deleteMeeting = (id) => {
        if (window.confirm('Delete this meeting?')) onUpdateMeetings(meetings.filter(x => x.id !== id));
      };

      return (
        <div className="max-w-4xl mx-auto px-4 py-6">
          <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
            <div>
              <div className="font-bold text-gray-900 text-lg">Schedule</div>
              <div className="text-sm text-gray-500">{sorted.length} of {meetings.length} meeting{meetings.length !== 1 ? 's' : ''}</div>
            </div>
            <div className="flex gap-2 flex-wrap">
              {cohorts && cohorts.length > 0 && (
                <select value={filterCohort} onChange={e => setFilterCohort(e.target.value)}
                  className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-200">
                  <option value="all">All Cohorts</option>
                  {cohorts.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                  <option value="none">No Cohort</option>
                </select>
              )}
              <button onClick={() => setShowAdd(true)} style={{ background: '#13294B' }}
                className="text-white px-4 py-2 rounded-lg text-sm font-semibold hover:opacity-90">
                + Add Meeting
              </button>
            </div>
          </div>

          {sorted.length === 0 ? (
            <div className="text-center py-16 text-gray-400">No meetings scheduled yet.</div>
          ) : (
            <div className="space-y-3">
              {sorted.map(mtg => {
                const noDate = !mtg.date;
                const isPast = !noDate && new Date(mtg.date + 'T' + (mtg.time || '23:59')) < now;
                return (
                  <div key={mtg.id} style={{ opacity: isPast ? 0.6 : 1 }} className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
                    <div className="flex items-start justify-between gap-3">
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-1 flex-wrap">
                          <span className="font-semibold text-gray-900">{mtg.title}</span>
                          <span style={{ background: mtg.type === 'group' ? '#EFF6FF' : '#F5F3FF', color: mtg.type === 'group' ? '#1D4ED8' : '#6D28D9' }}
                            className="text-xs px-2 py-0.5 rounded-full font-medium">{mtg.type === 'group' ? 'Group' : 'Individual'}</span>
                          {isPast && <span className="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">Past</span>}
                          {noDate && <span className="text-xs text-orange-500 bg-orange-50 border border-orange-200 px-2 py-0.5 rounded-full font-medium">Date TBD</span>}
                        </div>
                        <div className="text-sm text-gray-500">
                          {noDate ? 'Date and time not yet scheduled' : (mtg.date + (mtg.time ? ' at ' + mtg.time : ''))}
                        </div>
                        {mtg.description && <div className="text-xs text-gray-400 mt-1">{mtg.description}</div>}
                        {mtg.zoomLink && <div className="text-xs text-blue-500 truncate mt-1">{mtg.zoomLink}</div>}
                        {mtg.type === 'individual' && mtg.teamIds.length > 0 && (
                          <div className="text-xs text-gray-400 mt-1">
                            Teams: {mtg.teamIds.map(id => teams.find(t => t.id === id)?.name || id).join(', ')}
                          </div>
                        )}
                      </div>
                      <div className="flex gap-2 flex-shrink-0">
                        <button onClick={() => setEditMtg(mtg)}
                          style={noDate ? { background: '#FFF7ED', color: '#C2410C', border: '1px solid #FED7AA' } : { color: '#6B7280', border: '1px solid #E5E7EB' }}
                          className="text-xs px-2.5 py-1.5 rounded-lg hover:opacity-80 font-medium">{noDate ? 'Add Date' : 'Edit'}</button>
                        <button onClick={() => deleteMeeting(mtg.id)}
                          className="text-xs text-red-400 hover:text-red-600 border border-red-100 px-2.5 py-1.5 rounded-lg hover:bg-red-50">Delete</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {(showAdd || editMtg) && (
            <AddMeetingModal
              meeting={editMtg}
              teams={teams}
              cohorts={cohorts}
              onSave={saveMeeting}
              onClose={() => { setShowAdd(false); setEditMtg(null); }}
            />
          )}
        </div>
      );
    }

    function PMPortal({ teams, cohorts, meetings, settings, authenticated, onAuthenticate, onUpdateTeam, onAddTeam, onUpdateCohorts, onUpdateMeetings, onUpdateSettings, onBack }) {
      const [tab, setTab] = useState('overview');
      const [detailTeamId, setDetailTeamId] = useState(null);

      if (!authenticated) {
        return <PMAuthModal settings={settings} onAuth={onAuthenticate} onBack={onBack} />;
      }

      const tabs = [
        { id: 'overview', label: 'Teams' },
        { id: 'review', label: 'Review Queue' },
        { id: 'schedule', label: 'Schedule' },
        { id: 'settings', label: 'Settings' },
      ];

      const detailTeam = teams.find(t => t.id === detailTeamId);

      const pendingCount = (() => {
        let n = 0;
        teams.forEach(team => {
          MONTHS.forEach(m => {
            m.assignments.forEach(a => {
              if (team.assignments[m.id]?.[a.id]?.status === 'submitted') n++;
            });
          });
        });
        return n;
      })();

      return (
        <div className="min-h-screen" style={{ background: '#EDF4FB' }}>
          <div style={{ background: '#13294B' }} className="shadow-md sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-4">
              <div className="flex items-center justify-between py-3">
                <div className="flex items-center gap-3">
                  {detailTeam && tab === 'overview' && (
                    <button onClick={() => setDetailTeamId(null)} className="text-white/60 hover:text-white text-sm mr-1">
                      &lt; Teams
                    </button>
                  )}
                  <div style={{ background: '#4B9CD3' }} className="w-8 h-8 rounded-lg flex items-center justify-center font-black text-white text-base">K</div>
                  <div>
                    <div className="text-white font-bold text-base leading-tight">{settings.programName || 'Kairos'}</div>
                    <div className="text-white/40 text-xs leading-tight">Program Manager</div>
                  </div>
                  {detailTeam && tab === 'overview' && (
                    <div className="ml-2 flex items-center gap-2">
                      <span className="text-white/30">-</span>
                      <span className="text-white font-medium">{detailTeam.name}</span>
                    </div>
                  )}
                </div>
                <button onClick={onBack} className="text-white/60 hover:text-white text-sm">Exit</button>
              </div>
              <div className="flex gap-1 pb-0">
                {tabs.map(t => (
                  <button key={t.id} onClick={() => { setTab(t.id); if (t.id !== 'overview') setDetailTeamId(null); }}
                    style={{
                      color: tab === t.id ? '#4B9CD3' : 'rgba(255,255,255,0.5)',
                      borderBottom: tab === t.id ? '2px solid #4B9CD3' : '2px solid transparent',
                    }}
                    className="px-4 py-2.5 text-sm font-medium whitespace-nowrap transition-colors relative">
                    {t.label}
                    {t.id === 'review' && pendingCount > 0 && (
                      <span style={{ background: '#DC2626' }} className="absolute -top-0.5 -right-0.5 w-4 h-4 rounded-full text-white text-xs flex items-center justify-center font-bold">
                        {pendingCount > 9 ? '9+' : pendingCount}
                      </span>
                    )}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {tab === 'overview' && !detailTeam && (
            <Dashboard teams={teams} cohorts={cohorts} onAddTeam={onAddTeam} onSelectTeam={id => setDetailTeamId(id)} onUpdateTeam={onUpdateTeam} onUpdateCohorts={onUpdateCohorts} />
          )}
          {tab === 'overview' && detailTeam && (
            <TeamDetail team={detailTeam} onUpdate={onUpdateTeam} />
          )}
          {tab === 'review' && <PMReviewQueue teams={teams} onUpdateTeam={onUpdateTeam} />}
          {tab === 'schedule' && <PMScheduleTab meetings={meetings} teams={teams} cohorts={cohorts} onUpdateMeetings={onUpdateMeetings} />}
          {tab === 'settings' && <PMSettingsTab settings={settings} onUpdateSettings={onUpdateSettings} />}
        </div>
      );
    }

      { id: 'mtg_m0', title: 'M0 Onboarding Session', date: '', time: '', type: 'group', teamIds: [], zoomLink: '', description: 'Program kickoff. Mom Test methodology, Translation Memo briefing, communication norms, and program expectations.' },
      { id: 'mtg_m1', title: 'M1 Cohort Review - Problem Hypothesis', date: '', time: '', type: 'group', teamIds: [], zoomLink: '', description: 'Teams present problem hypotheses and UBIES stakeholder maps. Discovery call progress check (target: 15+ calls). Oh Sh*t Moment debrief.' },
      { id: 'mtg_m2', title: 'M2 Go/No-Go Review', date: '', time: '', type: 'group', teamIds: [], zoomLink: '', description: 'Market Reality Check presentations. Competitor Takedown Grid and TAM review. MD issues Go/No-Go decisions. Path A/B/C declarations.' },
      { id: 'mtg_m3', title: 'M3 Solution Design Review', date: '', time: '', type: 'group', teamIds: [], zoomLink: '', description: 'Prototype presentations and self-explanatory test results. Feature Funeral recap. Brand identity review. LTV/CAC napkin math.' },
      { id: 'mtg_m4', title: 'M4 IAB Hot Seat + Solution Gate', date: '', time: '', type: 'group', teamIds: [], zoomLink: '', description: 'Industry Advisory Board Hot Seat presentations. SCAMPER review. Two Stories rehearsal. MD issues Solution Gate verdict: Green / Yellow / Red.' },
      { id: 'mtg_m5', title: 'M5 Pilot Sales Review', date: '', time: '', type: 'group', teamIds: [], zoomLink: '', description: 'Sales Commitment Tracker review. Pilot plan presentations. Wizard of Oz walkthrough. Evidence of Demand tally against Contract Ladder tiers.' },
      { id: 'mtg_m6', title: 'Demo Day', date: '', time: '', type: 'group', teamIds: [], zoomLink: '', description: '20-minute investor-ready pitches. Data Room review. Graduation Verdict issued by MD. Post-Demo Day follow-up strategy.' },
    ];

    function App() {
      const [teams, setTeams] = useState(() => {
        try { const s = localStorage.getItem('kairos_v1_teams'); return s ? JSON.parse(s) : []; }
        catch { return []; }
      });
      const [meetings, setMeetings] = useState(() => {
        try {
          const s = localStorage.getItem('kairos_v1_meetings');
          const parsed = s ? JSON.parse(s) : null;
          return (parsed && parsed.length > 0) ? parsed : DEFAULT_MEETINGS;
        }
        catch { return DEFAULT_MEETINGS; }
      });
      const [cohorts, setCohorts] = useState(() => {
        try { const s = localStorage.getItem('kairos_v1_cohorts'); return s ? JSON.parse(s) : []; }
        catch { return []; }
      });
      const [settings, setSettings] = useState(() => {
        try { const s = localStorage.getItem('kairos_v1_settings'); return s ? { ...DEFAULT_SETTINGS, ...JSON.parse(s) } : DEFAULT_SETTINGS; }
        catch { return DEFAULT_SETTINGS; }
      });

      const [portal, setPortal] = useState('landing');
      const [teamPortalId, setTeamPortalId] = useState(null);
      const [pmAuthenticated, setPmAuthenticated] = useState(false);

      useEffect(() => { localStorage.setItem('kairos_v1_teams', JSON.stringify(teams)); }, [teams]);
      useEffect(() => { localStorage.setItem('kairos_v1_meetings', JSON.stringify(meetings)); }, [meetings]);
      useEffect(() => { localStorage.setItem('kairos_v1_settings', JSON.stringify(settings)); }, [settings]);
      useEffect(() => { localStorage.setItem('kairos_v1_cohorts', JSON.stringify(cohorts)); }, [cohorts]);

      const updateTeam = (updated) => setTeams(ts => ts.map(t => t.id === updated.id ? updated : t));
      const addTeam = (team) => setTeams(ts => [...ts, team]);

      const teamPortalTeam = teams.find(t => t.id === teamPortalId);

      if (portal === 'team' && teamPortalTeam) {
        return (
          <TeamPortal
            team={teamPortalTeam}
            meetings={meetings}
            settings={settings}
            onUpdate={updateTeam}
            onBack={() => { setPortal('landing'); setTeamPortalId(null); }}
          />
        );
      }

      if (portal === 'pm') {
        return (
          <PMPortal
            teams={teams}
            cohorts={cohorts}
            meetings={meetings}
            settings={settings}
            authenticated={pmAuthenticated}
            onAuthenticate={() => setPmAuthenticated(true)}
            onUpdateTeam={updateTeam}
            onAddTeam={addTeam}
            onUpdateCohorts={setCohorts}
            onUpdateMeetings={setMeetings}
            onUpdateSettings={setSettings}
            onBack={() => { setPortal('landing'); setPmAuthenticated(false); }}
          />
        );
      }

      return (
        <LandingPage
          teams={teams}
          onSelectTeam={id => { setTeamPortalId(id); setPortal('team'); }}
          onEnterPM={() => setPortal('pm')}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
